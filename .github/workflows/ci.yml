name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:
env:
  GODOT_VERSION: "4.6.3"
  GODOT_ZIP: "Godot_v4.6.3-stable_linux.x86_64.zip"
  GODOT_BINARY: "Godot_v4.6.3-stable_linux.x86_64"
  GODOT_CACHE_KEY: "godot-4.6.3-linux-x64"

jobs:
  generate-tres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Generate .tres files from YAML
        run: python3 dev/tools/yaml_to_tres.py --godot-root "$PWD"
      - uses: actions/upload-artifact@v4
        with:
          name: data-tres
          path: data/tres/
          retention-days: 1

  headless-check:
    needs: [generate-tres]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /tmp/godot-bin
          key: ${{ env.GODOT_CACHE_KEY }}
      - name: Install Godot headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/godot-bin
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_ZIP}" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot-bin/
          chmod +x /tmp/godot-bin/${GODOT_BINARY}
      - name: Restore data/tres
        uses: actions/download-artifact@v4
        with:
          name: data-tres
          path: data/tres/
      - name: Import and headless check
        timeout-minutes: 3
        shell: bash
        run: |
          /tmp/godot-bin/${GODOT_BINARY} --headless --path "$PWD" --import 2>&1 | tee /tmp/import-output.log || true
          /tmp/godot-bin/${GODOT_BINARY} --headless --path "$PWD" --quit 2>&1 | tee /tmp/headless-output.log
      - name: Check for error-level log lines
        if: always()
        run: |
          if grep -n -E "(SCRIPT ERROR|ERROR:|push_error|FATAL)" /tmp/headless-output.log \
            | grep -v -E "(AudioServer|DisplayServer)" \
            | grep -v -E "(PulseAudio|ALSA|D3D12|WASAPI|CoreAudio)" \
            | grep .; then
            echo "::error::Error-level log lines detected in headless output"
            exit 1
          else
            echo "No unexpected error lines found"
            exit 0
          fi

  unit-tests:
    needs: [generate-tres]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Godot binary
        id: cache-godot-unit
        uses: actions/cache@v4
        with:
          path: /tmp/godot-bin
          key: ${{ env.GODOT_CACHE_KEY }}
      - name: Install Godot headless
        if: steps.cache-godot-unit.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/godot-bin
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_ZIP}" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot-bin/
          chmod +x /tmp/godot-bin/${GODOT_BINARY}
      - name: Restore data/tres
        uses: actions/download-artifact@v4
        with:
          name: data-tres
          path: data/tres/
      - name: Import project
        timeout-minutes: 1
        run: |
          /tmp/godot-bin/${GODOT_BINARY} --headless --path "$PWD" --import 2>&1 || true
      - name: Run unit tests
        timeout-minutes: 2
        shell: bash
        run: |
          /tmp/godot-bin/${GODOT_BINARY} --headless --path "$PWD" --test-unit 2>&1 | tee /tmp/unit-output.log
          exit_code=$?
          if grep -q 'TestRunner: 0 scripts' /tmp/unit-output.log; then
            echo "::error::No test scripts executed — project may have parse errors or no test files found"
            exit 1
          fi
          exit $exit_code
      - name: Check for script errors in unit output
        if: always()
        run: |
          if grep -n "SCRIPT ERROR" /tmp/unit-output.log | grep .; then
            echo "::error::SCRIPT ERROR lines detected in unit test output"
            exit 1
          fi
